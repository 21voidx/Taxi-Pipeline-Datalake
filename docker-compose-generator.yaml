services:
  data-generator:
    build:
      context: ./data-generator/generator
    container_name: taxi-data-generator
    environment:
      DB_HOST: postgres-ops
      DB_PORT: 5432
      DB_NAME: ride_ops_pg
      DB_USER: postgres
      DB_PASSWORD: postgres
      TZ: Asia/Jakarta
      SIM_START_AT: '2026-01-01T00:00:00+07:00'
      SIM_SPEED: '60'
      TICK_SECONDS: '1'
      RIDES_PER_TICK_WEEKDAY_BASE: '2'
      RIDES_PER_TICK_WEEKEND_BASE: '3'
      INITIAL_DRIVERS: '150'
      INITIAL_PASSENGERS: '600'
      MAX_OPEN_RIDES: '400'
      RANDOM_SEED: '42'
    depends_on:
      postgres-ops:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mongodb-rs-init:
        condition: service_completed_successfully
    networks:
      - taxi-network

  postgres-ops:
    image: postgres:14-alpine
    container_name: taxi-postgres-ops
    environment:
      POSTGRES_DB: ride_ops_pg
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-ops-data:/var/lib/postgresql/data
      - ./data-generator/postgres/init_postgres.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
        -c wal_keep_size=1024
        -c shared_preload_libraries=pgoutput
        -c log_replication_commands=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ride_ops_pg"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taxi-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      # ME_CONFIG_MONGODB_SERVER: mongodb
      # ME_CONFIG_MONGODB_PORT: 27017
      # ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-mongo_admin}
      # ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo_password}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-express_user}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express_password}
    ports:
      - "8086:8081"
    networks:
      - taxi-network
    depends_on:
      mongodb:
        condition: service_healthy
        
  mongodb-rs-init:
    image: mongo:latest
    container_name: mongodb-rs-init
    networks:
      - taxi-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
        echo 'Initiating replica set ...' &&
        mongosh --host mongodb:27017 --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"mongodb:27017\" }]
          })
        ' || true &&
        sleep 5 &&
        echo 'Seeding collections ...' &&
        mongosh --host mongodb:27017 /scripts/init_mongodb.js
      "
    volumes:
      - ./data-generator/mongodb/init_mongodb.js:/scripts/init_mongodb.js:ro

networks:
  taxi-network:
    # driver: bridge
    external: true

volumes:
  postgres-ops-data:
  mongodb-data:
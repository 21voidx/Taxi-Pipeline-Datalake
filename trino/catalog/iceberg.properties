connector.name=iceberg

# ── Iceberg JDBC Catalog ─────────────────────────────────────────────────
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=iceberg
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://127.0.0.1:5434/iceberg_catalog
iceberg.jdbc-catalog.connection-user=iceberg
iceberg.jdbc-catalog.connection-password=iceberg123
iceberg.jdbc-catalog.default-warehouse-dir=s3://iceberg-warehouse/

# ── S3 / MinIO ───────────────────────────────────────────────────────────
fs.native-s3.enabled=true
s3.endpoint=http://127.0.0.1:9000
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true
s3.region=us-east-1

# ── File format defaults ─────────────────────────────────────────────────
iceberg.file-format=PARQUET
iceberg.compression-codec=SNAPPY

# ── Query optimizations ──────────────────────────────────────────────────
iceberg.split-manager-threads=4